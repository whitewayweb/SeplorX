name: CI — Tests & Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Unit Tests + Coverage Gate (≥80%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage threshold enforcement
        run: yarn test:coverage
        env:
          # Test-safe env vars — real secrets are NOT needed for unit tests
          # DB is mocked; crypto uses a deterministic test key
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: postgresql://unused:unused@localhost/unused
          NEXT_PUBLIC_APP_URL: https://test.example.com
          # Prevents env.ts from throwing "Missing required environment variables"
          NEXT_PHASE: phase-production-build

      - name: Upload HTML coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
